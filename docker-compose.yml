services:
  migrate:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations:ro
    command: >
      sh -c 'for f in /migrations/*.sql; do
        echo "Running $$f...";
        psql "$$DATABASE_URL" -f "$$f" || exit 1;
      done'
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  studio:
    image: supabase/studio:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - db

  meta:
    image: supabase/postgres-meta:v0.83.2
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
